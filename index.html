G<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Access</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
font-family:monospace;
}

/* FULL SCREEN IMAGE */

.bg{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-2;
}

/* DARK OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:-1;
}

/* WARNING */

.warning{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:50px;
font-weight:bold;
color:red;
text-shadow:0 0 20px red;
animation:blink 0.8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

/* TERMINAL */

.terminal{
position:absolute;
bottom:20px;
left:20px;
color:#00ff66;
font-size:18px;
width:90%;
height:35%;
overflow:hidden;
text-shadow:0 0 10px lime;
}

/* SCAN LINE */

.scan{
position:absolute;
width:100%;
height:4px;
background:lime;
box-shadow:0 0 20px lime;
animation:scan 3s linear infinite;
opacity:0.7;
}

@keyframes scan{
0%{
top:0;
}

100%{
top:100%;
}
}

</style>
</head>

<body>

<!-- YOUR IMAGE -->

<img class="bg"
src="https://i.ibb.co/qFDTT9Yq/IMG-20260513-235730.jpg">

<div class="overlay"></div>

<div class="warning">
SYSTEM HACKED
</div>

<div class="terminal" id="terminal"></div>

<div class="scan"></div>

<script>

const lines = [

"mai subhash chudakd...",
"meri gand hack ho gyi..",
"15 kilo ke aand mere mai hu rand...",
"Firewall bypassed...",
"Tracking device...",
"Syncing contacts...",
"Extracting gallery...",
"Uploading data...",
"Transfer complete...",
"Device compromised..."

];

const terminal =
document.getElementById("terminal");

let i = 0;

function addLine(){

const randomLine =
lines[Math.floor(Math.random()*lines.length)];

terminal.innerHTML +=
"> " + randomLine + "<br>";

terminal.scrollTop =
terminal.scrollHeight;

i++;

if(i < 200){
setTimeout(addLine,80);
}

}

addLine();

</script>

</body>
</html>
