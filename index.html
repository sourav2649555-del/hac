<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Access</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:black;
      font-family:monospace;
    }

    .bg{
      position:fixed;
      width:100%;
      height:100%;
      object-fit:cover;
      top:0;
      left:0;
      z-index:-1;
      filter:brightness(0.7);
    }

    .overlay{
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.35);
      top:0;
      left:0;
    }

    .warning{
      position:absolute;
      top:20px;
      width:100%;
      text-align:center;
      color:red;
      font-size:40px;
      font-weight:bold;
      animation:blink 0.7s infinite;
      text-shadow:0 0 20px red;
    }

    @keyframes blink{
      50%{
        opacity:0;
      }
    }

    .terminal{
      position:absolute;
      bottom:20px;
      left:20px;
      color:#00ff66;
      font-size:18px;
      width:90%;
      height:40%;
      overflow:hidden;
      text-shadow:0 0 10px #00ff66;
    }

    .scan{
      position:absolute;
      width:100%;
      height:4px;
      background:rgba(0,255,0,0.5);
      box-shadow:0 0 20px lime;
      animation:scan 3s linear infinite;
    }

    @keyframes scan{
      0%{
        top:0;
      }

      100%{
        top:100%;
      }
    }
  </style>
</head>

<body>

  <!-- YOUR IMAGE -->
  <img class="bg" src="https://ibb.co/zKp7Lrm">

  <div class="overlay"></div>

  <div class="warning">
    SYSTEM HACKED
  </div>

  <div class="terminal" id="terminal"></div>

  <div class="scan"></div>

  <script>

    const lines = [
      "Connecting to secure server...",
      "Access granted...",
      "Decrypting device data...",
      "Uploading files...",
      "Firewall bypassed...",
      "Tracking IP address...",
      "Installing malware...",
      "Extracting gallery...",
      "Syncing contacts...",
      "Device compromised...",
      "Root access enabled...",
      "Transfer complete..."
    ];

    const terminal = document.getElementById("terminal");

    let i = 0;

    function typeLine(){

      const randomLine =
      lines[Math.floor(Math.random()*lines.length)];

      terminal.innerHTML +=
      "> " + randomLine + "<br>";

      terminal.scrollTop =
      terminal.scrollHeight;

      i++;

      if(i < 200){
        setTimeout(typeLine,80);
      }
    }

    typeLine();

  </script>

</body>
</html>
